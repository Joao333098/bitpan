services:
  - type: web
    name: bitpan
    runtime: python
    branch: master
    buildCommand: pip install -e . && playwright install chromium --with-deps
    startCommand: python webapp/server.py
    plan: starter
    healthCheckPath: /
    envVars:
      - key: NOVA_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
