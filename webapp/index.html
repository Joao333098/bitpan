<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Index Agent</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --st: env(safe-area-inset-top, 0px);
      --sb: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%; height: 100dvh;
      font-family: 'Inter', -apple-system, sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── BACKGROUND ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(255,255,255,.04) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(255,255,255,.03) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }

    .app {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      height: 100%; height: 100dvh;
      overflow: hidden;
    }

    /* ── GLASS MIXIN helpers ── */
    .glass {
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid rgba(255,255,255,.1);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.12),
        0 8px 32px rgba(0,0,0,.4);
    }

    /* ── TOPBAR ── */
    .topbar {
      display: flex; align-items: center; gap: 12px;
      padding: calc(var(--st) + 14px) 18px 14px;
      flex-shrink: 0;
      background: rgba(255,255,255,.05);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border-bottom: 1px solid rgba(255,255,255,.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.1);
    }
    .logo {
      width: 36px; height: 36px; flex-shrink: 0;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.2);
    }
    .topbar-text { flex: 1; }
    .topbar-name { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -.3px; }
    .topbar-sub  { font-size: 11px; color: rgba(255,255,255,.4); margin-top: 1px; }

    .status-glass {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 99px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.12);
      font-size: 11px; font-weight: 500; color: rgba(255,255,255,.6);
    }
    .sdot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,.3); transition: .3s;
    }
    .sdot.on  { background: #fff; box-shadow: 0 0 8px rgba(255,255,255,.8); animation: glow 1.5s infinite; }
    .sdot.err { background: rgba(255,255,255,.5); }
    @keyframes glow { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── BROWSER CHROME ── */
    .browser-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px;
      flex-shrink: 0;
      background: rgba(255,255,255,.04);
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .nav-btn {
      width: 32px; height: 32px; flex-shrink: 0;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 9px; color: rgba(255,255,255,.5);
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: .15s; font-family: inherit;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .nav-btn:active { background: rgba(255,255,255,.14); color: #fff; }
    .nav-btn:disabled { opacity: .2; }

    .url-bar {
      flex: 1; display: flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 99px; padding: 7px 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.1);
    }
    .url-lock { font-size: 10px; color: rgba(255,255,255,.4); flex-shrink: 0; }
    #urlInput {
      flex: 1; background: none; border: none; outline: none;
      font-size: 12px; color: rgba(255,255,255,.8); font-family: inherit;
      min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #urlInput::placeholder { color: rgba(255,255,255,.25); }

    .live-chip {
      font-size: 9px; font-weight: 700; letter-spacing: .5px;
      padding: 2px 8px; border-radius: 99px;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      color: rgba(255,255,255,.7);
      display: none; animation: glow 1.5s infinite; flex-shrink: 0;
    }

    /* ── CANVAS ── */
    .canvas-wrap {
      flex: 0 0 auto;
      height: 42vh;
      position: relative; overflow: hidden; background: #050505;
      touch-action: none;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    #liveCanvas {
      width: 100%; height: 100%;
      object-fit: contain; display: block;
      touch-action: none;
    }
    .canvas-idle {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; pointer-events: none;
    }
    .canvas-idle-icon {
      font-size: 40px; opacity: .15;
    }
    .canvas-idle p {
      font-size: 12px; color: rgba(255,255,255,.2);
      text-align: center; line-height: 1.6;
    }

    /* ── ACTIVITY FEED — always visible ── */
    .feed-section {
      flex: 1; overflow: hidden;
      display: flex; flex-direction: column;
      min-height: 0;
    }
    .feed-inner {
      flex: 1; overflow-y: auto;
      padding: 14px 18px 10px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .feed-inner::-webkit-scrollbar { display: none; }

    /* Empty */
    .feed-empty {
      height: 100%; display: flex;
      align-items: center; justify-content: center;
      font-size: 12px; color: rgba(255,255,255,.15);
      text-align: center; line-height: 1.7;
    }

    /* Log entries — human-style, no containers */
    .log-entry {
      display: flex; gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
      animation: appear .2s ease;
    }
    .log-entry:last-child { border-bottom: none; }
    @keyframes appear { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }

    .log-time {
      font-size: 10px; color: rgba(255,255,255,.2);
      flex-shrink: 0; padding-top: 2px; font-variant-numeric: tabular-nums;
      min-width: 38px;
    }
    .log-content { flex: 1; min-width: 0; }
    .log-label {
      font-size: 9px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .6px; color: rgba(255,255,255,.25);
      margin-bottom: 2px;
    }
    .log-label.active { color: rgba(255,255,255,.5); }
    .log-label.done   { color: rgba(255,255,255,.45); }
    .log-label.err    { color: rgba(255,255,255,.35); }
    .log-text {
      font-size: 13px; font-weight: 400;
      color: rgba(255,255,255,.75);
      line-height: 1.5;
    }
    .log-text.typing::after {
      content: '|';
      animation: blink .7s step-end infinite;
      margin-left: 1px; color: rgba(255,255,255,.4);
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .log-entry.done .log-text { color: rgba(255,255,255,.6); }
    .log-entry.err  .log-text { color: rgba(255,255,255,.4); text-decoration: line-through; text-decoration-color: rgba(255,255,255,.2); }

    /* ── BOTTOM INPUT ── */
    .bottom {
      flex-shrink: 0;
      padding: 10px 14px calc(var(--sb) + 10px);
      background: rgba(255,255,255,.04);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border-top: 1px solid rgba(255,255,255,.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }

    /* Chips */
    .chips {
      display: flex; gap: 7px; overflow-x: auto;
      padding-bottom: 10px; scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      white-space: nowrap; font-size: 12px; font-weight: 400;
      padding: 6px 14px; border-radius: 99px; flex-shrink: 0;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.55);
      cursor: pointer; transition: .15s; font-family: inherit;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.1);
    }
    .chip:active { background: rgba(255,255,255,.14); color: rgba(255,255,255,.9); }

    /* Input glass pill */
    .input-glass {
      display: flex; align-items: flex-end; gap: 10px;
    }
    .input-pill {
      flex: 1; display: flex; align-items: flex-end; gap: 8px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 22px; padding: 11px 16px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.12),
                  0 4px 20px rgba(0,0,0,.3);
      transition: border-color .2s;
    }
    .input-pill:focus-within {
      border-color: rgba(255,255,255,.25);
      background: rgba(255,255,255,.09);
    }
    #promptInput {
      flex: 1; background: none; border: none; outline: none;
      font-size: 15px; color: #fff; font-family: inherit;
      resize: none; max-height: 110px; min-height: 22px;
      line-height: 1.45; overflow-y: auto; scrollbar-width: none;
    }
    #promptInput::-webkit-scrollbar { display: none; }
    #promptInput::placeholder { color: rgba(255,255,255,.25); }
    #promptInput:disabled { opacity: .35; }

    .send-btn {
      width: 42px; height: 42px; flex-shrink: 0;
      background: #fff;
      border: none; border-radius: 13px;
      color: #000; font-size: 17px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: .18s; font-family: inherit;
      box-shadow: 0 2px 12px rgba(255,255,255,.2);
    }
    .send-btn:active { transform: scale(.91); }
    .send-btn:disabled { opacity: .2; }

    /* Sub buttons */
    .sub-row { display: flex; gap: 8px; margin-top: 8px; }
    .sub-btn {
      flex: 1; height: 36px; border-radius: 12px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.45); font-size: 12px; font-weight: 500;
      cursor: pointer; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      transition: .15s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }
    .sub-btn:active { background: rgba(255,255,255,.12); color: rgba(255,255,255,.8); }
    .sub-btn:disabled { opacity: .2; }

    /* ── HUMAN MODAL ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 200;
      display: flex; flex-direction: column;
      justify-content: flex-end;
      animation: fadeIn .2s;
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .overlay.hidden { display: none; }

    .sheet {
      background: rgba(18,18,18,.92);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255,255,255,.1);
      border-bottom: none;
      border-radius: 26px 26px 0 0;
      padding: 20px 20px calc(var(--sb) + 24px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.12);
      animation: slideUp .25s ease;
    }
    @keyframes slideUp { from{transform:translateY(50px);opacity:0} to{transform:none;opacity:1} }

    .sheet-handle {
      width: 38px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,.15);
      margin: 0 auto 20px;
    }
    .sheet-title { font-size: 17px; font-weight: 600; margin-bottom: 5px; }
    .sheet-desc  { font-size: 13px; color: rgba(255,255,255,.4); margin-bottom: 18px; line-height: 1.5; }
    .sheet-ss { border-radius: 14px; overflow: hidden; margin-bottom: 16px; border: 1px solid rgba(255,255,255,.1); }
    .sheet-ss img { width: 100%; display: block; max-height: 240px; object-fit: contain; background: #000; }

    .sheet-input {
      width: 100%; background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 16px; padding: 13px 16px;
      font-size: 15px; color: #fff; font-family: inherit;
      outline: none; margin-bottom: 12px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.1);
    }
    .sheet-input::placeholder { color: rgba(255,255,255,.25); }
    .sheet-input:focus { border-color: rgba(255,255,255,.3); }

    .sheet-send {
      width: 100%; height: 50px; border-radius: 16px;
      background: #fff; color: #000;
      border: none; font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: .18s;
    }
    .sheet-send:active { transform: scale(.97); background: rgba(255,255,255,.9); }

    /* KB toast */
    .kb-toast {
      position: fixed;
      bottom: calc(var(--sb) + 120px);
      left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 99px; padding: 7px 18px;
      font-size: 12px; color: rgba(255,255,255,.7);
      z-index: 50; display: none; white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.12);
    }
    .kb-toast.show { display: block; }
  </style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">🤖</div>
    <div class="topbar-text">
      <div class="topbar-name">Index Agent</div>
      <div class="topbar-sub">Amazon Nova 2 Lite</div>
    </div>
    <div class="status-glass">
      <div class="sdot" id="sdot"></div>
      <span id="stxt">Idle</span>
    </div>
  </div>

  <!-- BROWSER CHROME -->
  <div class="browser-bar">
    <button class="nav-btn" onclick="nav('back')"    title="Back">‹</button>
    <button class="nav-btn" onclick="nav('forward')" title="Fwd">›</button>
    <button class="nav-btn" onclick="nav('refresh')" title="Refresh">↻</button>
    <div class="url-bar">
      <span class="url-lock" id="urlLock">🔒</span>
      <input id="urlInput" type="url" placeholder="about:blank"
             autocomplete="off" autocorrect="off" spellcheck="false"
             onkeydown="if(event.key==='Enter'){nav('goto',this.value.trim());this.blur()}" />
      <span class="live-chip" id="liveChip">LIVE</span>
    </div>
  </div>

  <!-- LIVE CANVAS -->
  <div class="canvas-wrap" id="canvasWrap"
       ontouchstart="touch(event,'s')"
       ontouchmove="touch(event,'m')"
       ontouchend="touch(event,'e')"
       onmousedown="mouse(event,'d')"
       onmouseup="mouse(event,'u')"
       onmousemove="mouse(event,'m')"
       oncontextmenu="mouse(event,'c');return false"
       onwheel="wheel(event)"
       onclick="focusKb()">
    <canvas id="liveCanvas"></canvas>
    <div class="canvas-idle" id="canvasIdle">
      <div class="canvas-idle-icon">🌐</div>
      <p>Live browser appears here<br>once the agent starts</p>
    </div>
  </div>

  <!-- ACTIVITY FEED — always visible -->
  <div class="feed-section">
    <div class="feed-inner" id="feedInner">
      <div class="feed-empty" id="feedEmpty">
        Start a task to see live activity here
      </div>
    </div>
  </div>

  <!-- BOTTOM INPUT -->
  <div class="bottom">
    <div class="chips" id="chipsRow">
      <button class="chip" onclick="setP('Summarize Hacker News top 5 stories')">Hacker News</button>
      <button class="chip" onclick="setP('Wikipedia featured article today')">Wikipedia</button>
      <button class="chip" onclick="setP('GitHub trending repos today')">GitHub trending</button>
      <button class="chip" onclick="setP('Search DuckDuckGo for AI news 2025')">AI news</button>
    </div>
    <div class="input-glass">
      <div class="input-pill">
        <textarea id="promptInput" rows="1"
                  placeholder="Ask the agent to do something…"
                  oninput="grow(this)"
                  onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();run()}"></textarea>
      </div>
      <button class="send-btn" id="runBtn" onclick="run()">▶</button>
    </div>
    <div class="sub-row">
      <button class="sub-btn" id="forceBtn" onclick="force()">⚡ Forçar</button>
      <button class="sub-btn" id="stopBtn"  onclick="stop()" disabled>■ Stop</button>
    </div>
  </div>

</div>

<!-- HUMAN BOTTOM SHEET -->
<div class="overlay hidden" id="humanOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">The agent needs your help</div>
    <div class="sheet-desc" id="sheetDesc">It ran into something it can't handle on its own.</div>
    <div class="sheet-ss" id="sheetSS" style="display:none">
      <img id="sheetImg" src="" alt="" />
    </div>
    <input class="sheet-input" id="sheetInput" type="text" placeholder="Type your answer…" />
    <button class="sheet-send" onclick="submitHelp()">Send</button>
  </div>
</div>

<div class="kb-toast" id="kbToast">⌨ Keyboard active — tap elsewhere to exit</div>

<script>
/* ── Canvas setup ── */
const BW = 1280, BH = 800;
const canvas = document.getElementById('liveCanvas');
const ctx = canvas.getContext('2d');
canvas.width = BW; canvas.height = BH;

/* ── WebSocket ── */
let ws = null;
function connect() {
  const p = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${p}//${location.host}/ws`);
  ws.onopen    = () => log('info', 'Connected and ready');
  ws.onmessage = e => handle(JSON.parse(e.data));
  ws.onclose   = () => { setStatus('idle'); setTimeout(connect, 2000); };
  ws.onerror   = () => ws.close();
}
const tx = o => ws && ws.readyState === 1 && ws.send(JSON.stringify(o));

/* ── Messages ── */
let _stepEl = null;

function handle(m) {
  switch (m.type) {
    case 'status':          setStatus(m.content); break;
    case 'step_start':      onStepStart(m.step); break;
    case 'live_frame':      drawJpeg(m.data); if (m.url) setUrl(m.url); break;
    case 'live_screenshot': if (m.screenshot) drawPng(m.screenshot); if (m.url) setUrl(m.url); break;
    case 'step':            onStep(m); break;
    case 'human_control':   onHuman(m); break;
    case 'final':           onFinal(m); break;
    case 'error':           log('err', m.content); break;
  }
}

/* ── Status ── */
function setStatus(s) {
  const dot = document.getElementById('sdot');
  const txt = document.getElementById('stxt');
  const run = document.getElementById('runBtn');
  const stp = document.getElementById('stopBtn');
  const inp = document.getElementById('promptInput');

  dot.className = 'sdot' + (s==='running'||s==='starting' ? ' on' : s==='error'||s==='paused' ? ' err' : '');

  if (s === 'paused') {
    txt.textContent = 'Paused';
    run.disabled = true; stp.disabled = false; inp.disabled = true;
  } else if (s === 'running' || s === 'starting') {
    txt.textContent = s === 'starting' ? 'Starting…' : 'Running';
    run.disabled = true; stp.disabled = false; inp.disabled = true;
  } else {
    txt.textContent = 'Idle';
    run.disabled = false; stp.disabled = true; inp.disabled = false;
    document.getElementById('liveChip').style.display = 'none';
  }
}

/* ── Steps ── */
function onStepStart(n) {
  _stepEl = log('step', '…', true, `Step ${n}`);
}
function onStep(m) {
  if (m.url) setUrl(m.url);
  if (m.screenshot) drawPng(m.screenshot);
  const text = m.summary || (m.is_done ? 'Done.' : 'Working…');
  if (_stepEl) updateLog(_stepEl, m.is_done ? 'done' : 'step', text, `Step ${m.step}`);
  else log(m.is_done ? 'done' : 'step', text, false, `Step ${m.step}`);
  _stepEl = null;
  if (m.error) log('err', m.error);
}
function onHuman(m) {
  if (m.screenshot) drawPng(m.screenshot);
  if (m.url) setUrl(m.url);
  document.getElementById('sheetDesc').textContent = m.message;
  const ss = document.getElementById('sheetSS');
  const si = document.getElementById('sheetImg');
  if (m.screenshot) { si.src = 'data:image/png;base64,'+m.screenshot; ss.style.display='block'; }
  else ss.style.display = 'none';
  document.getElementById('sheetInput').value = '';
  document.getElementById('humanOverlay').classList.remove('hidden');
  setTimeout(() => document.getElementById('sheetInput').focus(), 100);
  log('info', `Step ${m.step} — the agent needs your input`);
}
function onFinal(m) {
  log('done', m.content.slice(0,200));
}

/* ── Feed log ── */
const TYPE_LABEL = { step:'working', done:'done', err:'error', info:'info' };

function t() { return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }

function log(type, text, typing=false, label=null) {
  const inner = document.getElementById('feedInner');
  const empty = document.getElementById('feedEmpty');
  if (empty) empty.remove();

  const el = document.createElement('div');
  el.className = 'log-entry ' + (type==='done'?'done':type==='err'?'err':'');
  const lbl = label || TYPE_LABEL[type] || type;
  const txtClass = 'log-text' + (typing ? ' typing' : '');
  el.innerHTML = `
    <div class="log-time">${t()}</div>
    <div class="log-content">
      <div class="log-label ${type==='step'?'active':type==='done'?'done':type==='err'?'err':''}">${lbl}</div>
      <div class="${txtClass}">${esc(text)}</div>
    </div>`;
  inner.appendChild(el);
  inner.scrollTop = inner.scrollHeight;
  return el;
}

function updateLog(el, type, text, label) {
  el.className = 'log-entry ' + (type==='done'?'done':type==='err'?'err':'');
  el.querySelector('.log-label').className = 'log-label ' + (type==='done'?'done':type==='err'?'err':'');
  el.querySelector('.log-label').textContent = label || TYPE_LABEL[type] || type;
  const lt = el.querySelector('.log-text, [class*="log-text"]');
  lt.className = 'log-text';
  lt.textContent = text;
  document.getElementById('feedInner').scrollTop = 9999;
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── Canvas drawing ── */
function drawJpeg(b64) {
  showCanvas();
  const img = new Image();
  img.onload = () => ctx.drawImage(img, 0, 0, BW, BH);
  img.src = 'data:image/jpeg;base64,' + b64;
}
function drawPng(b64) {
  showCanvas();
  const img = new Image();
  img.onload = () => ctx.drawImage(img, 0, 0, BW, BH);
  img.src = 'data:image/png;base64,' + b64;
}
function showCanvas() {
  document.getElementById('canvasIdle').style.display = 'none';
  document.getElementById('liveChip').style.display = 'block';
}

/* ── URL bar ── */
function setUrl(url) {
  const inp = document.getElementById('urlInput');
  if (document.activeElement !== inp) inp.value = url;
  document.getElementById('urlLock').textContent = url.startsWith('https://') ? '🔒' : '🔓';
}

/* ── Touch ── */
function cxy(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  return {
    x: Math.round((clientX - r.left) * (BW / r.width)),
    y: Math.round((clientY - r.top)  * (BH / r.height)),
  };
}
function touch(e, type) {
  if (document.getElementById('canvasIdle').style.display !== 'none') return;
  e.preventDefault();
  const t0 = e.touches[0] || e.changedTouches[0];
  if (!t0) return;
  const {x,y} = cxy(t0.clientX, t0.clientY);
  if (type==='s') tx({type:'mousedown',x,y,button:0});
  if (type==='e') { tx({type:'mouseup',x,y,button:0}); tx({type:'click',x,y,button:0}); }
  if (type==='m') tx({type:'mousemove',x,y});
}

/* ── Mouse ── */
let _lm = 0;
function mouse(e, type) {
  if (document.getElementById('canvasIdle').style.display !== 'none') return;
  const {x,y} = cxy(e.clientX, e.clientY);
  if (x<0||y<0||x>BW||y>BH) return;
  if (type==='m') { if(Date.now()-_lm<50) return; _lm=Date.now(); tx({type:'mousemove',x,y}); return; }
  if (type==='d') tx({type:'mousedown',x,y,button:e.button});
  if (type==='u') tx({type:'mouseup',x,y,button:e.button});
  if (type==='c') tx({type:'click',x,y,button:2});
}
function wheel(e) {
  e.preventDefault();
  if (document.getElementById('canvasIdle').style.display !== 'none') return;
  const {x,y} = cxy(e.clientX, e.clientY);
  tx({type:'wheel',x,y,deltaX:e.deltaX,deltaY:e.deltaY});
}

/* ── Keyboard ── */
let _kb = false;
function focusKb() {
  if (document.getElementById('canvasIdle').style.display !== 'none') return;
  _kb = true;
  document.getElementById('kbToast').classList.add('show');
}
document.addEventListener('click', e => {
  if (!e.target.closest('#canvasWrap') && _kb) {
    _kb = false;
    document.getElementById('kbToast').classList.remove('show');
  }
});
document.addEventListener('keydown', e => {
  if (!_kb) return;
  if (e.key==='Escape') { _kb=false; document.getElementById('kbToast').classList.remove('show'); return; }
  e.preventDefault();
  tx({type:'keydown',key:e.key,code:e.code,modifiers:{shift:e.shiftKey,ctrl:e.ctrlKey,alt:e.altKey,meta:e.metaKey}});
});

/* ── Nav ── */
function nav(action, url) { tx({type:'navigate',action,url}); }

/* ── Agent actions ── */
function run() {
  const prompt = document.getElementById('promptInput').value.trim();
  if (!prompt || !ws || ws.readyState !== 1) return;

  document.getElementById('urlInput').value = '';
  ctx.clearRect(0,0,BW,BH);
  document.getElementById('canvasIdle').style.display = '';
  document.getElementById('liveChip').style.display = 'none';

  const fi = document.getElementById('feedInner');
  fi.innerHTML = '<div class="feed-empty" id="feedEmpty">Start a task to see live activity here</div>';

  document.getElementById('promptInput').value = '';
  document.getElementById('promptInput').style.height = 'auto';

  log('info', prompt);
  tx({type:'run', prompt});
}
function stop()  { tx({type:'stop'}); }
function force() { tx({type:'force_continue'}); log('info','Resuming from where it stopped…'); }
function setP(t) {
  const ta = document.getElementById('promptInput');
  ta.value = t; grow(ta); ta.focus();
}
function grow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

/* ── Human sheet ── */
function submitHelp() {
  const text = document.getElementById('sheetInput').value.trim();
  if (!text) return;
  tx({type:'human_input',text});
  log('info', 'You replied: ' + text);
  document.getElementById('humanOverlay').classList.add('hidden');
}
document.getElementById('sheetInput').addEventListener('keydown', e => {
  if (e.key==='Enter') submitHelp();
});

connect();
</script>
</body>
</html>
